<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watered Garden</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
        color: #fff;
        text-align: center;
        background: radial-gradient(ellipse at 50% 100%, #2b1d47 0%, #141a35 40%, #0a0c15 80%, #000 100%);
        overflow: hidden;
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      .slide {
        position: relative;
        z-index: 1;
        width: 100%;
        padding: 60px 5vw;
        line-height: 2;
      }

      .slide p {
        font-size: clamp(1rem, 3.8vw, 3.8rem);
        font-weight: 700;
        white-space: nowrap;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.85);
      }
    </style>
  </head>
  <body>
    <canvas id="stars"></canvas>
    <div class="slide">
      <p>
        주님 너를 항상 인도하시리<br />
        메마른 땅에서도 너를 만족시키리<br />
        너는 물댄동산 같겠고 마르지 않는 샘 같으리<br />
        너는 물댄동산 같겠고 마르지 않는 샘 같으리
      </p>
    </div>

    <script>
      const canvas = document.getElementById("stars");
      const ctx = canvas.getContext("2d");

      let width, height;
      const stars = [];
      const meteors = [];
      let lastMeteorTime = 0;

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function createStars() {
        stars.length = 0;
        const count = Math.floor((width * height) / 4000);
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            r: Math.random() * 1.5 + 0.3,
            alpha: Math.random(),
            speed: Math.random() * 0.02 + 0.005,
          });
        }
      }

      function createMeteor() {
        const direction = Math.floor(Math.random() * 6);
        let startX, startY, angle;
        const speed = Math.random() * 12 + 12;
        const length = Math.random() * 120 + 80;

        switch (direction) {
          case 0: // 좌상단 → 우하단
            startX = Math.random() * width * 1.2 - width * 0.1;
            startY = -100;
            angle = Math.PI / 4 + (Math.random() - 0.5) * 0.4;
            break;
          case 1: // 우상단 → 좌하단
            startX = Math.random() * width * 1.2 - width * 0.1;
            startY = -100;
            angle = (3 * Math.PI) / 4 + (Math.random() - 0.5) * 0.4;
            break;
          case 2: // 상단 → 하단
            startX = Math.random() * width;
            startY = -100;
            angle = Math.PI / 2 + (Math.random() - 0.5) * 0.3;
            break;
          case 3: // 하단 → 상단
            startX = Math.random() * width;
            startY = height + 100;
            angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.3;
            break;
          case 4: // 좌하단 → 우상단
            startX = -100;
            startY = Math.random() * height * 1.2 - height * 0.1;
            angle = -Math.PI / 4 + (Math.random() - 0.5) * 0.4;
            break;
          case 5: // 우하단 → 좌상단
            startX = width + 100;
            startY = Math.random() * height * 1.2 - height * 0.1;
            angle = (-3 * Math.PI) / 4 + (Math.random() - 0.5) * 0.4;
            break;
        }

        meteors.push({
          x: startX,
          y: startY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          length,
          life: 1,
          decay: 0.01 + Math.random() * 0.01,
        });
      }

      function drawMeteors() {
        for (let i = meteors.length - 1; i >= 0; i--) {
          const m = meteors[i];
          m.x += m.vx;
          m.y += m.vy;
          m.life -= m.decay;

          if (m.life <= 0 || m.x < -200 || m.x > width + 200 || m.y < -200 || m.y > height + 200) {
            meteors.splice(i, 1);
            continue;
          }

          const tailX = m.x - m.vx * (m.length / 20);
          const tailY = m.y - m.vy * (m.length / 20);
          const gradient = ctx.createLinearGradient(m.x, m.y, tailX, tailY);
          gradient.addColorStop(0, `rgba(255, 255, 255, ${m.life})`);
          gradient.addColorStop(0.4, `rgba(200, 220, 255, ${m.life * 0.5})`);
          gradient.addColorStop(1, "rgba(255, 255, 255, 0)");

          ctx.beginPath();
          ctx.moveTo(m.x, m.y);
          ctx.lineTo(tailX, tailY);
          ctx.strokeStyle = gradient;
          ctx.lineWidth = 2;
          ctx.lineCap = "round";
          ctx.stroke();
        }
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);

        stars.forEach((s) => {
          s.alpha += s.speed;
          const opacity = Math.abs(Math.sin(s.alpha));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
          ctx.fill();
        });

        if (Date.now() - lastMeteorTime > 20000 + Math.random() * 10000) {
          createMeteor();
          lastMeteorTime = Date.now();
        }
        drawMeteors();

        requestAnimationFrame(draw);
      }

      window.addEventListener("resize", () => {
        resize();
        createStars();
      });

      resize();
      createStars();
      draw();
    </script>
  </body>
</html>
