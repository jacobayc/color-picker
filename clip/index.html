                propPanel.addEventListener('mousedown', (e) => e.stopPropagation());
                propPanel.addEventListener('touchstart', (e) => e.stopPropagation());
            }

            // Setup Drag & Drop
            setupDrag(wrapper);

            // Click to select
            wrapper.addEventListener('mousedown', (e) => {
                if (isSpacePressed) return; // Allow board panning if space is held
                e.stopPropagation();
                selectElement(wrapper, e.shiftKey);
            });

            board.appendChild(wrapper);
            selectElement(wrapper);
            checkEmptyState();
            
            if (shouldSave) {
                saveToLocalStorage();
                showToast(`${type === 'memo' ? '메모' : '이미지'}가 추가되었습니다.`);
            }
        }

        // Drag Handler (Vanilla JS with Mobile Long-Press Support)
        function setupDrag(element) {
            let startX, startY, initialX, initialY;
            let isDragging = false;
            let touchTimer = null;
            let isTouchActive = false;

            element.addEventListener('mousedown', (e) => {
                if (isSpacePressed) return;
                
                const isEditingMemo = e.target.classList.contains('memo-textarea') && e.target.contentEditable === 'true';
                if (e.target.classList.contains('resize-handle') || e.target.classList.contains('delete-btn') || e.target.closest('.property-panel') || isEditingMemo) return;
                
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                initialX = parseFloat(element.style.left) || 0;
                initialY = parseFloat(element.style.top) || 0;

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });

            function onMouseMove(e) {
                if (!isDragging) return;
                const dx = (e.clientX - startX) / zoom;
                const dy = (e.clientY - startY) / zoom;
                
                element.style.left = `${initialX + dx}px`;
                element.style.top = `${initialY + dy}px`;
                updateIntersectionGuides();
            }

            function onMouseUp() {
                if (isDragging) {
                    pushUndoState();
                    isDragging = false;
                    saveToLocalStorage();
                }
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            // Mobile Touch Long-Press Drag Logic
            element.addEventListener('touchstart', (e) => {
                const isEditingMemo = e.target.classList.contains('memo-textarea') && e.target.contentEditable === 'true';
                if (e.target.classList.contains('resize-handle') || e.target.classList.contains('delete-btn') || e.target.closest('.property-panel') || isEditingMemo) return;

                if (e.touches.length === 1) {
                    const touch = e.touches[0];
                    startX = touch.clientX;
                    startY = touch.clientY;
                    initialX = parseFloat(element.style.left) || 0;
                    initialY = parseFloat(element.style.top) || 0;

                    // Provide visual ready cue on long press
                    element.classList.add('touch-ready');

                    touchTimer = setTimeout(() => {
                        isTouchActive = true;
                        isDragging = true;
                        element.classList.remove('touch-ready');
                        element.classList.add('touch-active');
                        selectElement(element);
                        showToast('이동 모드가 활성화되었습니다.');
                    }, 400); // 400ms long-press
                }
            }, { passive: true });

            element.addEventListener('touchmove', (e) => {
                if (e.touches.length > 1) {
                    clearTimeout(touchTimer);
                    element.classList.remove('touch-ready');
                    return;
                }

                const touch = e.touches[0];
                const moveDist = Math.hypot(touch.clientX - startX, touch.clientY - startY);

                // If user moves before long-press activates, cancel long press so canvas can pan naturally
                if (!isTouchActive && moveDist > 8) {
                    clearTimeout(touchTimer);
                    element.classList.remove('touch-ready');
                    return;
                }

                if (isTouchActive && isDragging) {
                    e.preventDefault(); // Prevent page/canvas scroll while dragging element
                    const dx = (touch.clientX - startX) / zoom;
                    const dy = (touch.clientY - startY) / zoom;

                    element.style.left = `${initialX + dx}px`;
                    element.style.top = `${initialY + dy}px`;
                    updateIntersectionGuides();
                }
            }, { passive: false });

            const cancelTouchDrag = () => {
                clearTimeout(touchTimer);
                element.classList.remove('touch-ready');
                if (isTouchActive) {
                    isTouchActive = false;
                    isDragging = false;
                    element.classList.remove('touch-active');
                    pushUndoState();
                    saveToLocalStorage();
                }
            };

            element.addEventListener('touchend', cancelTouchDrag);
            element.addEventListener('touchcancel', cancelTouchDrag);
        }

        // Resize Handler (Vanilla JS)
        function setupResize(element, handle) {
            const type = handle.dataset.handleType;
            const sizeBadge = element.querySelector('.size-badge');
            const wInput = element.querySelector('.prop-w');
            const hInput = element.querySelector('.prop-h');
            
            let startX, startY, initialW, initialH, initialX, initialY;
            let isResizing = false;

            handle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                e.preventDefault();
                
                isResizing = true;
                element.classList.add('resizing');
                startX = e.clientX;
                startY = e.clientY;
                initialW = element.offsetWidth;
                initialH = element.offsetHeight;
                initialX = parseFloat(element.style.left) || 0;
                initialY = parseFloat(element.style.top) || 0;

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });

            handle.addEventListener('touchstart', (e) => {
                if (e.touches.length !== 1) return;
                e.stopPropagation();
                e.preventDefault();

                const touch = e.touches[0];
                isResizing = true;
                element.classList.add('resizing');
                startX = touch.clientX;
                startY = touch.clientY;
                initialW = element.offsetWidth;
                initialH = element.offsetHeight;
                initialX = parseFloat(element.style.left) || 0;
                initialY = parseFloat(element.style.top) || 0;

                const onTouchMove = (evt) => {
                    if (!isResizing || evt.touches.length !== 1) return;
                    evt.preventDefault();
                    onMouseMove(evt.touches[0]);
                };

                const onTouchEnd = () => {
                    onMouseUp();
                    document.removeEventListener('touchmove', onTouchMove);
                    document.removeEventListener('touchend', onTouchEnd);
                    document.removeEventListener('touchcancel', onTouchEnd);
                };

                document.addEventListener('touchmove', onTouchMove, { passive: false });
                document.addEventListener('touchend', onTouchEnd);
                document.addEventListener('touchcancel', onTouchEnd);
            }, { passive: false });

            function onMouseMove(e) {
                if (!isResizing) return;

                const dx = (e.clientX - startX) / zoom;
                const dy = (e.clientY - startY) / zoom;
                const ratio = parseFloat(element.dataset.aspectRatio);
                const keepRatio = element.dataset.keepRatio === 'true';

                let nextW = initialW;
                let nextH = initialH;
                let nextX = initialX;
                let nextY = initialY;

                switch (type) {
                    case 'r':
                        nextW = Math.max(30, initialW + dx);
                        nextH = keepRatio ? nextW / ratio : initialH;
                        break;
                    case 'l':
                        nextW = Math.max(30, initialW - dx);
                        nextX = initialX + (initialW - nextW);
                        nextH = keepRatio ? nextW / ratio : initialH;
                        break;
                    case 'b':
                        nextH = Math.max(30, initialH + dy);
                        nextW = keepRatio ? nextH * ratio : initialW;
                        break;
                    case 't':
                        nextH = Math.max(30, initialH - dy);
                        nextY = initialY + (initialH - nextH);
                        nextW = keepRatio ? nextH * ratio : initialW;
                        break;
                    case 'br':
                        nextW = Math.max(30, initialW + dx);
                        nextH = keepRatio ? nextW / ratio : Math.max(30, initialH + dy);
                        break;
                    case 'bl':
                        nextW = Math.max(30, initialW - dx);
                        nextX = initialX + (initialW - nextW);
                        nextH = keepRatio ? nextW / ratio : Math.max(30, initialH + dy);
                        break;
                    case 'tr':
                        nextW = Math.max(30, initialW + dx);
                        nextH = keepRatio ? nextW / ratio : Math.max(30, initialH - dy);
                        nextY = initialY + (initialH - nextH);
                        break;
                    case 'tl':
                        nextW = Math.max(30, initialW - dx);
                        nextX = initialX + (initialW - nextW);
                        nextH = keepRatio ? nextW / ratio : Math.max(30, initialH - dy);
                        nextY = initialY + (initialH - nextH);
                        break;
                }

                element.style.width = `${nextW}px`;
                element.style.height = `${nextH}px`;
                element.style.left = `${nextX}px`;
                element.style.top = `${nextY}px`;

                if (sizeBadge) {
                    sizeBadge.textContent = `${Math.round(nextW)} × ${Math.round(nextH)}px`;
                }

                if (wInput) wInput.value = Math.round(nextW);
                if (hInput) hInput.value = Math.round(nextH);

                const memoText = element.querySelector('.memo-textarea');
                if (memoText) {
                    checkScrollIndicator(memoText);
                }
                updateIntersectionGuides();
            }

            // End Resize
            function onMouseUp() {
                if (isResizing) {
                    pushUndoState();
                    isResizing = false;
                    element.classList.remove('resizing');
                    saveToLocalStorage();
                }
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }
        }

        // Theme Toggle
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('clip_canvas_theme', newTheme);
            
            updateThemeIcon(newTheme);
            
            // Re-render all memo card backgrounds to blend with the new theme colors
            document.querySelectorAll('.image-wrapper.memo-card').forEach(card => {
                const op = card.dataset.opacity !== undefined ? parseInt(card.dataset.opacity) : 100;
                updateCardOpacity(card, op);
            });

            showToast(`${newTheme === 'dark' ? '다크' : '라이트'} 모드로 전환되었습니다.`);
        });

        function updateThemeIcon(theme) {
            if (theme === 'dark') {
                themeToggle.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;
            } else {
                themeToggle.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;
            }
        }

        // Grid Toggle
        gridToggle.addEventListener('click', () => {
            document.body.classList.toggle('no-grid');
            const isNoGrid = document.body.classList.contains('no-grid');
            showToast(isNoGrid ? '그리드가 비활성화되었습니다.' : '그리드가 활성화되었습니다.');
        });

        // Clear All
        clearAllBtn.addEventListener('click', () => {
            const cardCount = board.querySelectorAll('.image-wrapper').length;
            if (cardCount === 0) return;
            if (confirm('캔버스의 모든 요소를 삭제하시겠습니까?')) {
                board.querySelectorAll('.image-wrapper').forEach(el => el.remove());
                localStorage.removeItem('clip_canvas_cards');
                deselectAll();
                checkEmptyState();
                showToast('캔버스가 초기화되었습니다.');
            }
        });

        // Deselect when clicking canvas background
        document.body.addEventListener('mousedown', (e) => {
            if (e.target === canvas || e.target === board || e.target === document.body) {
                deselectAll();
            }
        });

        // Floating Text Format Toolbar Logic
        const textFormatToolbar = document.getElementById('text-format-toolbar');
        const textFormatSize = document.getElementById('text-format-size');
        const textFormatBold = document.getElementById('text-format-bold');
        let savedRange = null;
        let isFormatting = false;

        document.addEventListener('selectionchange', () => {
            // Guard: Do not hide or reset if currently modifying format or focused inside input
            if (isFormatting || (document.activeElement && document.activeElement.closest('#text-format-toolbar'))) {
                return;
            }

            const selection = window.getSelection();
            if (selection.isCollapsed || selection.rangeCount === 0) {
                textFormatToolbar.style.display = 'none';
                savedRange = null;
                return;
            }

            const range = selection.getRangeAt(0);
            let container = range.commonAncestorContainer;
            if (container.nodeType === Node.TEXT_NODE) {
                container = container.parentNode;
            }

            const memoTextarea = container.closest('.memo-textarea');
            if (memoTextarea) {
                savedRange = range.cloneRange(); // Backup the active text range
                
                const rect = range.getBoundingClientRect();
                textFormatToolbar.style.display = 'flex';
                
                const toolbarW = textFormatToolbar.offsetWidth || 120;
                const toolbarH = textFormatToolbar.offsetHeight || 34;
                
                let targetLeft = rect.left + window.scrollX + (rect.width / 2) - (toolbarW / 2);
                let targetTop = rect.top + window.scrollY - toolbarH - 10;
                
                // Fallback position if selection bounding box is collapsed to 0
                if (rect.width === 0 || rect.height === 0) {
                    const memoRect = memoTextarea.getBoundingClientRect();
                    targetLeft = memoRect.left + window.scrollX + (memoRect.width / 2) - (toolbarW / 2);
                    targetTop = memoRect.top + window.scrollY - toolbarH - 10;
                }
                
                textFormatToolbar.style.left = `${targetLeft}px`;
                textFormatToolbar.style.top = `${targetTop}px`;
                
                // Track font size of selection node if present
                let currentSize = '13';
                let checkEl = container;
                while (checkEl && checkEl !== memoTextarea) {
                    if (checkEl.style && checkEl.style.fontSize) {
                        currentSize = checkEl.style.fontSize.replace('px', '');
                        break;
                    }
                    checkEl = checkEl.parentNode;
                }
                textFormatSize.value = currentSize;
            } else {
                textFormatToolbar.style.display = 'none';
                savedRange = null;
            }
        });

        // Apply style to selection helper with savedRange restoration and focus memory
        function applyStyleToSelection(styleName, styleValue) {
            isFormatting = true; // Lock selection change actions
            const activeInput = document.activeElement;
            
            const selection = window.getSelection();
            const range = savedRange ? savedRange.cloneRange() : (selection.rangeCount > 0 ? selection.getRangeAt(0) : null);
            if (!range) {
                isFormatting = false;
                return;
            }

            // Restore selection to perform style replacement safely
            selection.removeAllRanges();
            selection.addRange(range);

            const span = document.createElement('span');
            span.style[styleName] = styleValue;

            try {
                const fragment = range.extractContents();
                span.appendChild(fragment);
                range.insertNode(span);
                
                // Keep the newly styled node selected and update backup
                const newRange = document.createRange();
                newRange.selectNodeContents(span);
                selection.removeAllRanges();
                selection.addRange(newRange);
                savedRange = newRange.cloneRange();
            } catch (err) {
                console.error('서식 적용 오류:', err);
            }

            // Restore focus back to the input element asynchronously and place cursor at the end
            if (activeInput && (activeInput.tagName === 'INPUT' || activeInput.tagName === 'TEXTAREA')) {
                setTimeout(() => {
                    activeInput.focus();
                    const temp = activeInput.value;
                    activeInput.value = '';
                    activeInput.value = temp;
                }, 10);
            }
            saveToLocalStorage();
        }

        // Keep isFormatting active during focus & modification, with 150ms buffer on blur
        textFormatSize.addEventListener('focus', () => { 
            isFormatting = true; 
        });
        textFormatSize.addEventListener('blur', () => { 
            setTimeout(() => {
                if (document.activeElement !== textFormatSize && !document.activeElement.closest('#text-format-toolbar')) {
                    isFormatting = false;
                }
            }, 150);
        });

        // Bold button trigger
        textFormatBold.addEventListener('mousedown', (e) => {
            e.preventDefault(); 
            if (savedRange) {
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(savedRange);
            }
            document.execCommand('bold', false, null);
            
            // Re-capture updated selection range
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                savedRange = selection.getRangeAt(0).cloneRange();
            }
            saveToLocalStorage();
        });

        // Size input trigger
        textFormatSize.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            if (val && val > 0) {
                applyStyleToSelection('fontSize', `${val}px`);
            }
        });

        // Keep toolbar open
        textFormatToolbar.addEventListener('mousedown', (e) => {
            e.stopPropagation();
        });

        // Initialize and Load states
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('clip_canvas_theme') || 'light';
            updateThemeIcon(savedTheme);
            loadBoardState();
            loadFromLocalStorage();

            // Register PWA Service Worker & Install Prompt
            let deferredPrompt = null;
            const pwaInstallBtn = document.getElementById('pwa-install-btn');

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                if (pwaInstallBtn) {
                    pwaInstallBtn.style.display = 'flex';
                }
            });

            if (pwaInstallBtn) {
                pwaInstallBtn.addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        if (outcome === 'accepted') {
                            showToast('앱이 성공적으로 설치되었습니다!');
                        }
                        deferredPrompt = null;
                        pwaInstallBtn.style.display = 'none';
                    } else {
                        showToast('iOS Safari는 [공유] → [홈 화면에 추가]를 눌러주세요.');
                    }
                });
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA Service Worker registered:', reg.scope))
                    .catch(err => console.error('PWA Service Worker registration failed:', err));
            }
        });
    </script>
</body>
</html>
